services:
  gitea:
    image: gitea/gitea:1.22
    container_name: gitea
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - gitea-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - GITEA__server__ROOT_URL=${GITEA_URL:-http://localhost:3000}/
      - GITEA__server__SSH_PORT=2222
      - GITEA__server__SSH_DOMAIN=${GITEA_DOMAIN:-localhost}
      - GITEA__server__LFS_START_SERVER=false
      - GITEA__service__DISABLE_REGISTRATION=true
      - GITEA__service__REQUIRE_SIGNIN_VIEW=true
      - GITEA__openid__ENABLE_OPENID_SIGNIN=false
      - GITEA__openid__ENABLE_OPENID_SIGNUP=false
      - GITEA__api__ENABLE_SWAGGER=false

  provisioner:
    image: python:3.12-alpine
    container_name: provisioner
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - GITEA_INTERNAL_URL=http://gitea:3000
      - GITEA_EXTERNAL_URL=${GITEA_URL:-http://localhost:3000}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - GITEA_ORG=hackathon
      - TEMPLATE_REPO=_template
      - ALLOWED_DOMAIN=bubble.io
    volumes:
      - ./provisioner.py:/app/provisioner.py:ro
    command: python /app/provisioner.py
    depends_on:
      - gitea

volumes:
  gitea-data:
